version: "3.8"

services:
  # ── Frontend (React + nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_GO2RTC_URL=${VITE_GO2RTC_URL}
    container_name: meocare-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - meocare-network

  # ── Backend (Node.js) ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    container_name: meocare-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - postgres-core
      - mongo-chat
    # volumes:
      # - ./backend/data:/app/backend/data    # ⚠️ Có thể COMMENT dòng này lại sau khi chuyển hẳn sang Postgres
      # - ./token:/app/token:ro               # meocare.pem
    networks:
      - meocare-network

  # ── PostgreSQL: Core Database ────────────────
  postgres-core:
    image: postgres:16-alpine
    container_name: meocare-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432" 
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meocare-network

  # ── MongoDB: Chat Database ──────────────────
  mongo-chat:
    image: mongo:7
    container_name: meocare-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - meocare-network

  # ── Mongo Express: GUI ──────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: meocare-mongo-gui
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ME_PORT}:8081" 
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo-chat:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASICAUTH_PASSWORD}
    depends_on:
      - mongo-chat
    networks:
      - meocare-network

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    networks:
      - meocare-network

  # -─ go2rtc (RTSP server) ─────────────────────────────────────────────────────
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: meocare_go2rtc
    network_mode: host # Giữ nguyên cấu hình cũ của bạn
    restart: unless-stopped
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml 

# ── Định nghĩa Network & Volumes ──────────────────────────────────────────────
networks:
  meocare-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data: