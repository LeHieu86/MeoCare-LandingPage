version: "3.8"

services:
  # ── Frontend (React + nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: meocare-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Backend (Node.js) ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    container_name: meocare-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/backend/data    # SQLite — meocare.db
      - ./token:/app/token:ro               # meocare.pem

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiZTFjYTY1M2MwODI5MTk2YmRhMGQ3MTgzN2MwZWI3Y2UiLCJ0IjoiYjA4OTk5MjMtYTBmZi00ZTg5LTkyOTAtMTY0MDExZTk2NjMzIiwicyI6Ill6QTRObVV4T1RJdE5qWmlPQzAwTmpjNExUa3lOamd0WWpGbFltSTRNVEkwWlRBeiJ9
    restart: unless-stopped
    depends_on:
      - frontend
      - backend