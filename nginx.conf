server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests đến backend
    location /api/ {
        proxy_pass http://meocare-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Socket.IO
    location /socket.io/ {
        proxy_pass http://meocare-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy go2rtc — stream video đi qua nginx → Cloudflare Tunnel (giảm latency)
    # Browser gọi /go2rtc/... → nginx forward sang meocare_go2rtc:1984/...
    location /go2rtc/ {
        proxy_pass http://meocare_go2rtc:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # Tắt buffering — video stream cần push bytes ngay, không đợi buffer đầy
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── index.html: KHÔNG cache — browser phải fetch mới để check SW ──
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── Service Worker & manifest: KHÔNG cache ───────────────────
    location ~* (sw\.js|registerSW\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── Workbox runtime files: cache ngắn (có hash trong tên) ────
    location ~* workbox-.*\.js$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Static assets có hash: cache vĩnh viễn ───────────────────
    location ~* /assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── React Router — fallback về index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}