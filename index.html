<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport: KHÔNG có viewport-fit=cover
         → iOS tự đặt web content vào safe area (dưới status bar, trên home indicator)
         → Không cần CSS env(safe-area-inset-*) phức tạp                          -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />

    <link rel="icon" type="image/png" href="/logo.png?v=4" />

    <!-- ========================================== -->
    <!-- ✅ PWA CROSS-PLATFORM (Android & iOS)      -->
    <!-- ========================================== -->

    <!-- 1. Dành cho iOS (Safari) - BẮT BUỘC phải có -->
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png?v=4">

    <!-- 2. Status bar: default = iOS tự quản lý vùng an toàn -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- 3. Theme color cho Android (Thanh address bar) — đồng bộ brand hồng (--cl-primary) -->
    <meta name="theme-color" content="#FF6B9D">
    
    <title>MeoMeoCare</title>
  </head>
  <!-- ✅ Đóng thẻ head đúng vị trí -->
  
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
